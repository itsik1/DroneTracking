# Multi-target scenario (Ph6): THREE drones over a `field_5dev`-like array.
#   - drone 0 (primary):   linear diagonal sweep at 60 m
#   - drone 1 (extra):     a second linear track crossing the field on the opposite
#                          diagonal at 90 m -- well separated from drone 0 in altitude
#                          and ground track
#   - drone 2 (extra):     a circle in the middle at 40 m
# Geometry mirrors field_5dev: 5 devices in a ~200 m field, 4 of them GPS anchors at
# VARIED HEIGHTS (masts/buildings) so 3D georeferencing is unambiguous. Moderate noise.
name: multi_drone
seed: 42
speed_of_sound_mps: 343.0
sample_rate_hz: 48000.0
duration_s: 20.0
dt_s: 0.5            # one emission per drone every 0.5 s
ranging_rounds: 40
origin_latlon: [32.0853, 34.7818]

noise:
  ranging_timestamp_std_s: 3.0e-5   # ~1 cm at 343 m/s
  toa_std_s: 5.0e-5                 # ~1.7 cm
  proc_delay_jitter_s: 2.0e-5
  gps_pos_std_m: 2.0

devices:
  - {id: dev0, position_m: [0.0,   0.0,    0.0], clock_offset_s:  0.00, clock_drift_ppm:   0.0, proc_delay_s: 0.00200, has_gps: true}
  - {id: dev1, position_m: [200.0, 0.0,   18.0], clock_offset_s:  0.12, clock_drift_ppm:  30.0, proc_delay_s: 0.00210, has_gps: true}
  - {id: dev2, position_m: [200.0, 200.0,  5.0], clock_offset_s: -0.08, clock_drift_ppm: -20.0, proc_delay_s: 0.00190, has_gps: true}
  - {id: dev3, position_m: [0.0,   200.0, 12.0], clock_offset_s:  0.05, clock_drift_ppm:  12.0, proc_delay_s: 0.00205, has_gps: true}
  - {id: dev4, position_m: [100.0, 100.0,  2.0], clock_offset_s: -0.03, clock_drift_ppm:  45.0, proc_delay_s: 0.00205}

# Primary drone (target 0): diagonal sweep at 60 m.
trajectory:
  kind: linear
  z_m: 60.0
  params:
    start_m: [-50.0, 50.0]
    end_m:   [250.0, 150.0]

# Additional targets, well separated from the primary and from each other.
extra_drones:
  # Target 1: opposite diagonal at 90 m altitude.
  - kind: linear
    z_m: 90.0
    params:
      start_m: [250.0, 30.0]
      end_m:   [-30.0, 220.0]
  # Target 2: a slow circle in the middle at 40 m.
  - kind: circular
    z_m: 40.0
    params:
      center_m: [100.0, 100.0]
      radius_m: 35.0
      angular_rate_rad_s: 0.22
