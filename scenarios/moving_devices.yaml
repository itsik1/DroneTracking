# Ph3 demo: a MOVING device array (continuous geometry). 6 ground devices in a
# ~220 m field, 4 of them GPS anchors at varied heights. Three devices drift
# slowly (0.5-2 m/s) -- e.g. handheld / vehicle-mounted nodes -- so the array
# geometry is time-varying and must be re-solved per window. A drone flies a
# diagonal overhead. Moderate consumer-grade noise; 90 ranging rounds spread over
# 40 s give plenty of windows for the sliding-window tracker.
name: moving_devices
seed: 11
speed_of_sound_mps: 343.0
sample_rate_hz: 48000.0
duration_s: 40.0
dt_s: 0.5
ranging_rounds: 90
origin_latlon: [32.0853, 34.7818]

noise:
  ranging_timestamp_std_s: 3.0e-5   # ~1 cm at 343 m/s
  toa_std_s: 5.0e-5                 # ~1.7 cm
  proc_delay_jitter_s: 2.0e-5
  gps_pos_std_m: 2.0

# velocity_mps defaults to [0,0,0]; three nodes below carry a slow drift.
devices:
  # Four GPS anchors at varied heights (masts / rooftops / ground).
  - {id: dev0, position_m: [0.0,   0.0,    0.0], clock_offset_s:  0.00, clock_drift_ppm:  0.0, proc_delay_s: 0.00200, has_gps: true}
  # dev1 is an anchor on a slow-moving vehicle (exercises a moving GPS node).
  - {id: dev1, position_m: [220.0, 0.0,   18.0], clock_offset_s:  0.10, clock_drift_ppm: 25.0, proc_delay_s: 0.00210, has_gps: true, velocity_mps: [-0.6, 0.0, 0.0]}
  - {id: dev2, position_m: [220.0, 220.0,  5.0], clock_offset_s: -0.08, clock_drift_ppm: -18.0, proc_delay_s: 0.00190, has_gps: true}
  - {id: dev3, position_m: [0.0,   220.0, 12.0], clock_offset_s:  0.05, clock_drift_ppm: 12.0, proc_delay_s: 0.00205, has_gps: true}
  # Two non-anchor nodes; also movers (slow drift).
  - {id: dev4, position_m: [110.0, 100.0,  2.0], clock_offset_s: -0.03, clock_drift_ppm: 30.0, proc_delay_s: 0.00205, velocity_mps: [1.0,  0.5, 0.0]}
  - {id: dev5, position_m: [60.0,  150.0,  3.0], clock_offset_s:  0.07, clock_drift_ppm: -22.0, proc_delay_s: 0.00198, velocity_mps: [0.0, -0.8, 0.0]}

trajectory:
  kind: linear
  z_m: 60.0
  params:
    start_m: [-60.0, 40.0]
    end_m:   [280.0, 180.0]
