# Stress scenario: 7 devices, 4 anchors (sparse ratio) at varied heights, HIGH noise,
# drone flies a circle. Exercises poorer geometry / conditioning and noisier clock
# recovery -- the "where does accuracy degrade" case. Run manually; not an asserted e2e target.
name: sparse_anchors_circular
seed: 7
speed_of_sound_mps: 343.0
sample_rate_hz: 48000.0
duration_s: 24.0
dt_s: 0.5
ranging_rounds: 30
origin_latlon: [32.0853, 34.7818]

noise:
  ranging_timestamp_std_s: 8.0e-5   # ~2.7 cm
  toa_std_s: 1.5e-4                 # ~5 cm
  proc_delay_jitter_s: 5.0e-5
  gps_pos_std_m: 4.0

devices:
  - {id: dev0, position_m: [0.0,   0.0,    0.0], clock_offset_s:  0.00, clock_drift_ppm:   0.0, proc_delay_s: 0.00200, has_gps: true}
  - {id: dev1, position_m: [240.0, 10.0,  22.0], clock_offset_s:  0.18, clock_drift_ppm:  40.0, proc_delay_s: 0.00215, has_gps: true}
  - {id: dev2, position_m: [120.0, 230.0,  8.0], clock_offset_s: -0.11, clock_drift_ppm: -30.0, proc_delay_s: 0.00190, has_gps: true}
  - {id: dev3, position_m: [60.0,  120.0,  0.5], clock_offset_s:  0.06, clock_drift_ppm:  22.0, proc_delay_s: 0.00205}
  - {id: dev4, position_m: [200.0, 180.0, 16.0], clock_offset_s: -0.09, clock_drift_ppm:  15.0, proc_delay_s: 0.00208, has_gps: true}
  - {id: dev5, position_m: [30.0,  210.0,  1.0], clock_offset_s:  0.13, clock_drift_ppm: -12.0, proc_delay_s: 0.00198}
  - {id: dev6, position_m: [170.0, 70.0,   2.5], clock_offset_s: -0.05, clock_drift_ppm:  33.0, proc_delay_s: 0.00203}

trajectory:
  kind: circular
  z_m: 55.0
  params:
    center_m: [120.0, 120.0]
    radius_m: 90.0
    angular_rate_rad_s: 0.28
