# Acoustic-detection demo (Ph4): the drone emits a known pulse every dt_s, each device
# records a synthesized waveform, and matched-filter detection recovers arrival times.
# dt_s is set WELL ABOVE the cross-device range-delay spread (~0.7 s here) so per-device
# pulse ordering maps cleanly to emission index. Run with: --scenario this --detect
name: detection_demo
seed: 11
speed_of_sound_mps: 343.0
sample_rate_hz: 16000.0     # 16 kHz -> ~2 cm timing resolution; keeps audio synth cheap
duration_s: 18.0
dt_s: 2.0                   # emissions 2 s apart >> ~0.7 s max range-delay spread
ranging_rounds: 30
origin_latlon: [32.0853, 34.7818]

noise:
  ranging_timestamp_std_s: 3.0e-5
  toa_std_s: 0.0            # detection itself is the noise source here
  proc_delay_jitter_s: 2.0e-5
  gps_pos_std_m: 2.0

audio:
  snr_db: 12.0             # pulse-to-(rotor+white)-noise power ratio
  pulse: chirp
  f0: 1500.0
  f1: 5500.0
  pulse_dur_s: 0.02
  rotor_fundamental_hz: 95.0
  rotor_harmonics: 4
  rotor_level: 0.4

devices:
  - {id: dev0, position_m: [0.0,   0.0,    0.0], clock_offset_s:  0.00, clock_drift_ppm:   0.0, proc_delay_s: 0.00200, has_gps: true}
  - {id: dev1, position_m: [200.0, 0.0,   18.0], clock_offset_s:  0.12, clock_drift_ppm:  30.0, proc_delay_s: 0.00210, has_gps: true}
  - {id: dev2, position_m: [200.0, 200.0,  5.0], clock_offset_s: -0.08, clock_drift_ppm: -20.0, proc_delay_s: 0.00190, has_gps: true}
  - {id: dev3, position_m: [0.0,   200.0, 12.0], clock_offset_s:  0.05, clock_drift_ppm:  12.0, proc_delay_s: 0.00205, has_gps: true}
  - {id: dev4, position_m: [100.0, 100.0,  2.0], clock_offset_s: -0.03, clock_drift_ppm:  45.0, proc_delay_s: 0.00205}

trajectory:
  kind: linear
  z_m: 60.0
  params:
    start_m: [-40.0, 50.0]
    end_m:   [240.0, 150.0]
